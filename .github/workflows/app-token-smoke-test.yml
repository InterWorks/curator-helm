name: App Token Smoke Test

# TEMPORARY — verifies the release-automation GitHub App is installed on this
# repo and the RELEASE_PLEASE_APP_ID / RELEASE_PLEASE_APP_PRIVATE_KEY org
# secrets are wired correctly, from a PR and with no release side effects.
# Delete this workflow before merging to main.
on:
  pull_request:

jobs:
  smoke:
    runs-on: us-east-2-development
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Confirm the token can act on this repo
        env:
          TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "Minted an installation token for app: ${{ steps.app-token.outputs.app-slug }}"
          code=$(curl -s -o /tmp/resp.json -w '%{http_code}' \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          echo "GET /repos/${{ github.repository }} -> HTTP $code"
          if [[ "$code" != "200" ]]; then cat /tmp/resp.json; exit 1; fi
          echo "App token authenticated and scoped to this repo."
