name: Verify Changes

on:
  pull_request:

jobs:
  commitlint:
    runs-on: us-east-2-development
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      # release-please derives versions and the changelog from conventional
      # commits, so every commit in the PR must follow that format.
      - name: Lint PR commits
        run: >
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
