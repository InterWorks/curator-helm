name: Verify Changes

on:
  pull_request:

jobs:
  commitlint:
    runs-on: us-east-2-development
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # Installs node at the version pinned in mise.toml, matching local dev
      # and the other workflows.
      - name: Set up tools via mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      # `npm ci` installs the exact versions from package-lock.json, so the
      # linter can't drift between runs.
      - name: Install commitlint
        run: npm ci

      # release-please derives versions and the changelog from conventional
      # commits, so every commit in the PR must follow that format.
      - name: Lint PR commits
        run: >
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
