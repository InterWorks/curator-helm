name: Release Charts

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Maintains a release PR that bumps charts/curator/Chart.yaml and the
  # CHANGELOG from conventional commits. Merging that PR tags v<version>
  # and creates the GitHub release.
  release-please:
    runs-on: us-east-2-development-docker
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Only runs once a release PR is merged. Packages the chart, publishes the
  # curator-<version> GitHub release with the .tgz, and updates index.yaml on
  # the gh-pages Helm repository.
  publish-chart:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: us-east-2-development-docker
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NOTES_FILE: "CHANGELOG.md"
          CR_MAKE_RELEASE_LATEST: "true"
