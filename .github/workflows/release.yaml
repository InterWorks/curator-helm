name: Release Charts

on:
  push:
    branches:
      - main
  # Allows manually (re-)publishing a chart release from the Actions tab —
  # e.g. to backfill a release whose publish step was skipped. Provide the
  # release tag so chart-releaser packages that exact version.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v2.6.0 (leave blank on push-triggered runs)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Maintains a release PR that bumps charts/curator/Chart.yaml and the
  # CHANGELOG from conventional commits. Merging that PR tags v<version>
  # and creates the GitHub release.
  release-please:
    runs-on: us-east-2-development-docker
    outputs:
      # release-please prefixes per-package outputs with the package path, so
      # the un-prefixed `release_created` is never set here. `releases_created`
      # (aggregate, always set) is the correct gate for a single-package repo.
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['charts/curator--tag_name'] }}
    env:
      # release-please names its branch
      # release-please--branches--<target-branch>--components--<package-name>.
      # Keep in sync with release-please-config.json / the target branch.
      RELEASE_BRANCH: release-please--branches--main--components--curator
    steps:
      # Mint a short-lived token from the release-automation GitHub App. Unlike
      # the default GITHUB_TOKEN, pushes made with it DO trigger other
      # workflows, so the release PR gets its CI checks with no manual nudging.
      # The token is scoped to this repo; its permission ceiling is whatever
      # the App itself is granted (contents + pull-requests, and issues for PR
      # labels).
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # When a release PR is open, regenerate helm-docs on its branch so the
      # README version badge tracks the bumped Chart.yaml. Pushed with the app
      # token so the release PR's checks re-run against the corrected docs.
      - name: Check out release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up tools via mise
        if: steps.release.outputs.prs_created == 'true'
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Regenerate and push helm-docs
        if: steps.release.outputs.prs_created == 'true'
        run: |
          helm-docs --chart-search-root=charts
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Docs already up to date; nothing to commit."
            exit 0
          fi
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git commit -am "docs(curator): regenerate helm-docs for release"
          git push origin HEAD:${{ env.RELEASE_BRANCH }}

  # Runs when a release PR is merged (release created) or when triggered
  # manually. Packages the chart, publishes the curator-<version> GitHub
  # release with the .tgz, and updates index.yaml on the gh-pages Helm repo.
  publish-chart:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: us-east-2-development-docker
    permissions:
      contents: write
    steps:
      # Check out the release tag so the version-bump commit is HEAD.
      # chart-releaser diffs HEAD against the previous tag to decide what to
      # package; running against a later commit hides the bump and produces
      # "nothing to do". On push this is the tag release-please just created;
      # on manual runs it is the `tag` input.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          # Idempotent re-runs: don't fail if curator-<version> already exists.
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NOTES_FILE: "CHANGELOG.md"
          CR_MAKE_RELEASE_LATEST: "true"
