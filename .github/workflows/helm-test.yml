name: Helm Unit Tests

on:
  pull_request:

jobs:
  helm-unittest:
    runs-on: us-east-2-development
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Installs the tools pinned in mise.toml (notably helm) so CI matches
      # what developers run locally.
      - name: Set up tools via mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1 --verify=false

      - name: Run helm unit tests
        run: helm unittest charts/curator
