name: Update Release Docs

# release-please bumps charts/curator/Chart.yaml on its release PR branch, but
# the helm-docs README (whose version badge renders that value) is not
# regenerated. This workflow runs whenever release-please creates or updates
# that branch, regenerates the docs, and commits them back to the PR branch so
# the version badge tracks the bump and the "Check Helm Documentation" check
# passes on the release PR.
on:
  push:
    branches:
      - 'release-please--**'

permissions:
  contents: write

jobs:
  helm-docs:
    runs-on: us-east-2-development
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up tools via mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Regenerate helm-docs
        run: helm-docs --chart-search-root=charts

      - name: Commit and push regenerated docs
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "Docs already up to date; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "docs(curator): regenerate helm-docs for release"
          git push origin HEAD:${{ github.ref_name }}
