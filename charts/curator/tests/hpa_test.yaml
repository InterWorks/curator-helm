# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test horizontalpodautoscaler
templates:
  - hpa.yaml
release:
  name: curator
tests:
  - it: renders in the prod environment by default with default replica bounds
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: is not rendered outside prod when autoscaling is disabled
    set:
      environment: dev
      autoscaling.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: honours min and max replicas when autoscaling is enabled
    set:
      environment: dev
      autoscaling.enabled: true
      autoscaling.minReplicas: 3
      autoscaling.maxReplicas: 7
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 7
