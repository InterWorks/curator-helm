# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test serviceaccount
templates:
  - serviceaccount.yaml
release:
  name: curator
tests:
  - it: creates a ServiceAccount named after the release by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: curator
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: uses serviceAccount.name when provided
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: renders custom labels and annotations
    set:
      serviceAccount.labels:
        team: data
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/curator
    asserts:
      - equal:
          path: metadata.labels.team
          value: data
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/curator

  - it: does not render when create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
